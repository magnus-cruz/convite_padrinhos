# ==================================
# Configurações da Aplicação
# ==================================

# Nome da aplicação
spring.application.name=convite-padrinhos-sala

# ==================================
# Configurações do Servidor
# ==================================

# Porta do servidor (padrão: 8080)
server.port=8080

# Contexto da aplicação (raiz: /)
server.servlet.context-path=/

# ==================================
# Configurações de Logging
# ==================================

# Nível de log (DEBUG, INFO, WARN, ERROR)
logging.level.root=INFO
logging.level.com.convite.padrinhos=INFO

# Formato de log no console
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ==================================
# Configurações de Recursos Estáticos
# ==================================

# Cache de recursos estáticos (desabilitado em desenvolvimento)
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false

# Localizações dos recursos estáticos
spring.web.resources.static-locations=file:./,classpath:/static/

# ==================================
# Configurações de Encoding
# ==================================

# Encoding padrão
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==================================
# Mensagens de Banner
# ==================================

# Banner do Spring Boot (pode ser desabilitado com: off)
spring.main.banner-mode=console

# ==================================
# Configurações de DevTools
# ==================================

# Restart automático quando arquivos mudarem
spring.devtools.restart.enabled=true

# Livereload (atualização automática do navegador)
spring.devtools.livereload.enabled=true
